name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest -q
      - name: Validate migrations
        run: alembic upgrade head --sql > /tmp/migration.sql

  build-and-push:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/celebritybot' }}
      PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ github.token }}
      BOT_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -e
            mkdir -p "$DEPLOY_PATH"
            mkdir -p "$DEPLOY_PATH/media"

      - name: Write .env from secret
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH,PROD_ENV_FILE
          script: |
            set -e
            printf '%s' "$PROD_ENV_FILE" > "$DEPLOY_PATH/.env"
            chmod 600 "$DEPLOY_PATH/.env"

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH,GHCR_USER,GHCR_TOKEN,BOT_IMAGE
          script: |
            set -e
            cd "$DEPLOY_PATH"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            HOST_BOT_PORT="$(grep -E '^BOT_PORT=' "$DEPLOY_PATH/.env" | tail -n1 | cut -d'=' -f2-)"
            HOST_BOT_PORT="${HOST_BOT_PORT:-8080}"
            CONFLICT_IDS="$(docker ps --format '{{.ID}} {{.Ports}}' | awk -v p="127.0.0.1:${HOST_BOT_PORT}->" '$0 ~ p {print $1}')"
            if [ -n "$CONFLICT_IDS" ]; then
              echo "Stopping containers using 127.0.0.1:${HOST_BOT_PORT}: $CONFLICT_IDS"
              docker stop $CONFLICT_IDS || true
              docker rm $CONFLICT_IDS || true
            fi

            BOT_IMAGE="$BOT_IMAGE" docker compose --env-file "$DEPLOY_PATH/.env" -f docker-compose.prod.yml pull bot
            BOT_IMAGE="$BOT_IMAGE" docker compose --env-file "$DEPLOY_PATH/.env" -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
