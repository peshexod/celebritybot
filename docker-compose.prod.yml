services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: celebrity_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d celebrity_bot"]
      interval: 10s
      timeout: 5s
      retries: 20

  bot:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m bot.main"

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - bot

volumes:
  pg_data_prod:
