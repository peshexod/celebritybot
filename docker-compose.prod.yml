services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: celebrity_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d celebrity_bot"]
      interval: 10s
      timeout: 5s
      retries: 20

  bot:
    image: ${BOT_IMAGE:-ghcr.io/peshexod/celebritybot:latest}
    restart: always
    env_file:
      - .env
    environment:
      WEBHOOK_HOST: ${WEBHOOK_HOST:-https://example.com}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m bot.main"

volumes:
  pg_data_prod:
