services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: celebrity_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d celebrity_bot"]
      interval: 5s
      timeout: 3s
      retries: 20

  bot:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    command: sh -c "alembic upgrade head && python -m bot.main"

volumes:
  pg_data:
